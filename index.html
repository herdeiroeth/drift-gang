<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loading-screen" class="overlay loading">
    <h1>LOADING</h1>
    <p>Carregando BMW M4 F82… <span id="loading-progress">0%</span></p>
  </div>

  <div id="start-screen" class="overlay">
    <h1>DRIFT 3D</h1>
    <p>Press SPACE to Start</p>
    <div class="controls">
      <p>W / S — Gas / Brake</p>
      <p>A / D — Steer</p>
      <p>Shift — Handbrake</p>
      <p>Space — Nitro</p>
      <p>R — Reset</p>
      <p>C — Camera</p>
      <p>V — Camera Studio</p>
      <p>K — Tuning</p>
    </div>
    <div class="credits">
      Modelo: <a href="https://sketchfab.com" target="_blank" rel="noopener">BMW M4 F82</a> — CC-BY 4.0
    </div>
  </div>

  <footer id="model-credit">
    BMW M4 F82 — modelo 3D licenciado <a href="http://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC-BY 4.0</a>
  </footer>

  <div id="hud" class="hud hidden">
    <div class="hud-left">
      <div class="speed"><span id="speed-val">0</span> <small>KM/H</small></div>
    </div>
    <div class="hud-center">
      <div class="drift-score" id="drift-score">0</div>
      <div class="combo" id="combo">1x</div>
    </div>
    <div class="hud-right">
      <div class="total-score">SCORE <span id="total-score">0</span></div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
